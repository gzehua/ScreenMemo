name: Release

on:
  push:
    branches-ignore:
      - "**"
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  android:
    name: Android APK Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.7"
          channel: stable
          cache: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.0.12077973"

      - name: Parse tag version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          if [[ ! "$VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
            echo "::error::Release tag must start with vMAJOR.MINOR.PATCH, got: $TAG"
            exit 1
          fi

          MAJOR="${BASH_REMATCH[1]}"
          MINOR="${BASH_REMATCH[2]}"
          PATCH="${BASH_REMATCH[3]}"
          # Android versionCode 必须是整数；这里从 tag 派生，versionName 仍使用完整 tag 版本。
          BUILD_NUMBER=$((10#$MAJOR * 1000000 + 10#$MINOR * 1000 + 10#$PATCH))

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Configure Android release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_SIGNING_CERT_SHA256: ${{ secrets.ANDROID_SIGNING_CERT_SHA256 }}
        shell: bash
        run: |
          set -euo pipefail

          missing=()
          for name in \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_SIGNING_CERT_SHA256
          do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            joined="$(IFS=,; echo "${missing[*]}")"
            echo "::error::Missing required Android signing secrets: ${joined}"
            exit 1
          fi

          mkdir -p android/app
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

          {
            printf 'storePassword=%s\n' "$ANDROID_KEYSTORE_PASSWORD"
            printf 'keyPassword=%s\n' "$ANDROID_KEY_PASSWORD"
            printf 'keyAlias=%s\n' "$ANDROID_KEY_ALIAS"
            printf 'storeFile=upload-keystore.jks\n'
            printf 'certSha256=%s\n' "$ANDROID_SIGNING_CERT_SHA256"
          } > android/key.properties

          chmod 600 android/app/upload-keystore.jks android/key.properties

      - name: Flutter clean
        run: flutter clean

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Build APKs (split per ABI)
        shell: bash
        run: |
          flutter build apk --release --split-per-abi --tree-shake-icons --obfuscate --split-debug-info=build/symbols \
            --build-name="${{ steps.version.outputs.version }}" \
            --build-number="${{ steps.version.outputs.build_number }}"

      - name: Verify APK signing certificates
        env:
          ANDROID_SIGNING_CERT_SHA256: ${{ secrets.ANDROID_SIGNING_CERT_SHA256 }}
        shell: bash
        run: |
          set -euo pipefail

          expected="$(printf '%s' "$ANDROID_SIGNING_CERT_SHA256" | tr '[:upper:]' '[:lower:]' | sed 's/[^0-9a-f]//g')"
          expected="${expected: -64}"
          if [[ ${#expected} -ne 64 ]]; then
            echo "::error::ANDROID_SIGNING_CERT_SHA256 must contain 64 hex characters."
            exit 1
          fi
          apksigner="$ANDROID_HOME/build-tools/36.0.0/apksigner"

          shopt -s nullglob
          apks=(build/app/outputs/flutter-apk/*-release.apk)
          if (( ${#apks[@]} == 0 )); then
            echo "::error::No release APKs were produced."
            exit 1
          fi

          for apk in "${apks[@]}"; do
            actual="$("$apksigner" verify --print-certs "$apk" | awk -F': ' '/Signer #1 certificate SHA-256 digest/ { print tolower($2); exit }')"
            actual="$(printf '%s' "$actual" | tr '[:upper:]' '[:lower:]' | sed 's/[^0-9a-f]//g')"
            actual="${actual: -64}"
            if [[ -z "$actual" ]]; then
              echo "::error file=$apk::Unable to read APK signing certificate."
              exit 1
            fi
            if [[ "$actual" != "$expected" ]]; then
              echo "::error file=$apk::APK signing certificate mismatch. Expected $expected but found $actual."
              exit 1
            fi
            echo "$(basename "$apk"): $actual"
          done

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist
          for apk in build/app/outputs/flutter-apk/*.apk; do
            base="$(basename "$apk")"
            cp "$apk" "dist/screen_memo-${{ steps.version.outputs.tag }}-${base}"
          done
          (cd build && zip -r "../dist/symbols-${{ steps.version.outputs.tag }}.zip" symbols)
          if [[ -f "build/app/outputs/mapping/release/mapping.txt" ]]; then
            cp build/app/outputs/mapping/release/mapping.txt "dist/mapping-${{ steps.version.outputs.tag }}.txt"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.tag }}
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.apk
            dist/*.zip
            dist/*.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
